<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rookie Rally Tournament — Tournament Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --court-deep:#0B3D2E;
    --court-panel:#0F4A38;
    --court-line:#F7F4EC;
    --cream:#F7F4EC;
    --ink:#0E1A15;
    --smash:#E85D3D;
    --smash-dark:#C94A2C;
    --gold:#D4A72C;
    --muted:#9FCBB8;
    --danger:#C94A2C;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--court-deep);
    background-image:
      repeating-linear-gradient(0deg, rgba(247,244,236,0.035) 0px, rgba(247,244,236,0.035) 1px, transparent 1px, transparent 64px),
      repeating-linear-gradient(90deg, rgba(247,244,236,0.035) 0px, rgba(247,244,236,0.035) 1px, transparent 1px, transparent 64px);
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
  }
  .display{font-family:'Anton', sans-serif; letter-spacing:0.5px;}
  .mono{font-family:'JetBrains Mono', monospace;}
  a{color:inherit;}
  #app{max-width:980px; margin:0 auto; padding:20px 16px 80px;}

  header.top{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:18px 20px; border-radius:var(--radius);
    background:linear-gradient(135deg, var(--court-panel), var(--court-deep));
    border:1px solid rgba(247,244,236,0.12);
    margin-bottom:18px;
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .brand-mark{
    width:46px; height:46px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff 0%, var(--court-line) 40%, var(--muted) 100%);
    position:relative; flex-shrink:0;
    box-shadow:0 0 0 3px rgba(247,244,236,0.15);
    display:flex; align-items:center; justify-content:center;
  }
  .brand-mark svg{ width:26px; height:26px; }
  .brand h1{font-size:22px; margin:0; text-transform:uppercase;}
  .brand p{margin:2px 0 0; font-size:12px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase;}

  .admin-controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end;}
  .pill{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; padding:6px 12px; border-radius:999px;
    background:rgba(247,244,236,0.08); border:1px solid rgba(247,244,236,0.18);
    text-transform:uppercase; letter-spacing:0.8px;
  }
  .pill.on{background:var(--gold); color:var(--ink); border-color:var(--gold); font-weight:700;}

  button, .btn{
    font-family:'Work Sans', sans-serif; font-weight:600; font-size:13px;
    padding:9px 16px; border-radius:10px; border:1px solid rgba(247,244,236,0.25);
    background:rgba(247,244,236,0.06); color:var(--cream); cursor:pointer;
    transition:all .15s ease;
  }
  button:hover{background:rgba(247,244,236,0.14);}
  button.primary{background:var(--smash); border-color:var(--smash); color:#fff;}
  button.primary:hover{background:var(--smash-dark);}
  button.gold{background:var(--gold); border-color:var(--gold); color:var(--ink);}
  button.ghost{background:transparent;}
  button.small{padding:5px 10px; font-size:12px;}
  button:disabled{opacity:0.4; cursor:not-allowed;}
  input, textarea, select{
    font-family:'Work Sans', sans-serif; font-size:14px;
    background:rgba(247,244,236,0.06); border:1px solid rgba(247,244,236,0.25);
    color:var(--cream); border-radius:8px; padding:8px 10px; width:100%;
  }
  input::placeholder, textarea::placeholder{color:rgba(247,244,236,0.45);}
  input:focus, textarea:focus, select:focus, button:focus-visible{
    outline:2px solid var(--gold); outline-offset:1px;
  }
  label{font-size:12px; text-transform:uppercase; letter-spacing:0.6px; color:var(--muted); display:block; margin-bottom:4px;}

  nav.tabs{display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap;}
  nav.tabs button{
    background:rgba(247,244,236,0.04); border-radius:999px; padding:8px 16px;
    text-transform:uppercase; font-size:12px; letter-spacing:0.8px;
  }
  nav.tabs button.active{background:var(--cream); color:var(--court-deep); border-color:var(--cream);}

  .card{
    background:var(--court-panel); border:1px solid rgba(247,244,236,0.12);
    border-radius:var(--radius); padding:18px; margin-bottom:16px;
  }
  .card h2{font-size:16px; margin:0 0 12px; text-transform:uppercase; letter-spacing:0.6px; display:flex; align-items:center; gap:8px;}
  .card h2 .eyebrow{color:var(--gold); font-family:'JetBrains Mono',monospace; font-size:12px;}
  .empty{color:var(--muted); font-size:14px; padding:12px 0;}

  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media (max-width:600px){ .grid-2{grid-template-columns:1fr;} }

  .team-row{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:10px 0; border-bottom:1px solid rgba(247,244,236,0.08);
    gap:10px;
  }
  .team-row:last-child{border-bottom:none;}
  .team-name{font-weight:700;}
  .team-members{font-size:12px; color:var(--muted); margin-top:2px;}

  .opt-grid{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
  .opt-btn{
    background:rgba(247,244,236,0.04); border:1px solid rgba(247,244,236,0.2);
    border-radius:10px; padding:10px 14px; text-align:left; cursor:pointer; min-width:140px;
  }
  .opt-btn.selected{border-color:var(--gold); background:rgba(212,167,44,0.12);}
  .opt-big{font-family:'Anton',sans-serif; font-size:22px;}
  .opt-sub{font-size:11px; color:var(--muted); text-transform:uppercase;}

  .group-block{margin-bottom:22px;}
  .group-title{font-family:'Anton',sans-serif; font-size:15px; letter-spacing:0.5px; color:var(--gold); margin-bottom:8px; text-transform:uppercase;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th, td{padding:7px 8px; text-align:left; border-bottom:1px solid rgba(247,244,236,0.08);}
  th{color:var(--muted); text-transform:uppercase; font-size:10px; letter-spacing:0.5px;}
  tr.leader td{color:var(--gold); font-weight:700;}

  .match{
    background:rgba(0,0,0,0.15); border:1px solid rgba(247,244,236,0.1);
    border-radius:12px; padding:12px 14px; margin-bottom:10px;
  }
  .match-top{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
  .versus{display:flex; align-items:center; gap:10px; flex:1; min-width:220px;}
  .team-chip{
    padding:6px 12px; border-radius:8px; background:rgba(247,244,236,0.06);
    font-weight:700; font-size:14px; min-width:90px; text-align:center;
  }
  .team-chip.tbd{color:var(--muted); font-weight:400; font-style:italic;}
  .team-chip.win{background:var(--gold); color:var(--ink);}
  .vs-txt{color:var(--muted); font-size:11px; text-transform:uppercase;}
  .score-mono{font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700;}
  .match-actions{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:10px;}
  .score-edit{display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap;}
  .score-edit input{width:70px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:16px;}
  .winner-tag{
    font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--gold);
    font-weight:700; display:flex; align-items:center; gap:4px;
  }
  .toss-note{font-size:11px; color:var(--muted); margin-top:6px;}

  /* Coin toss */
  .coin-wrap{display:flex; flex-direction:column; align-items:center; gap:10px; padding:14px 0;}
  .coin-scene{perspective:800px;}
  .coin{
    width:110px; height:110px; position:relative; transform-style:preserve-3d;
    transition:transform 2.2s cubic-bezier(.2,.9,.25,1);
  }
  .coin.flip{ transform:rotateY(1800deg); }
  .coin.flip.tails{ transform:rotateY(1980deg); }
  .coin-face{
    position:absolute; inset:0; border-radius:50%; backface-visibility:hidden;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    border:3px solid #8a6d1a; font-family:'Anton',sans-serif;
  }
  .coin-face.heads{ background:radial-gradient(circle at 35% 30%, #ffe9a8, var(--gold) 70%); color:#5a4310; }
  .coin-face.tails{ background:radial-gradient(circle at 35% 30%, #fff8e6, #e8c766 70%); color:#5a4310; transform:rotateY(180deg); }
  .coin-face .big{font-size:26px; line-height:1;}
  .coin-face .small{font-size:9px; letter-spacing:1px; margin-top:2px;}
  .toss-result{font-family:'Anton',sans-serif; font-size:18px; color:var(--gold); min-height:24px;}

  /* Bracket */
  .bracket{display:flex; gap:26px; overflow-x:auto; padding:6px 2px 16px;}
  .bracket-round{display:flex; flex-direction:column; justify-content:space-around; gap:16px; min-width:190px;}
  .bracket-round h3{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--gold); margin:0 0 4px;}
  .bmatch{background:rgba(0,0,0,0.18); border:1px solid rgba(247,244,236,0.12); border-radius:10px; padding:8px 10px;}
  .bmatch .bteam{display:flex; justify-content:space-between; font-size:13px; padding:3px 0;}
  .bmatch .bteam.win{color:var(--gold); font-weight:700;}
  .bmatch .bteam.tbd{color:var(--muted); font-style:italic;}

  .champion-banner{
    text-align:center; padding:30px 16px; border-radius:var(--radius);
    background:linear-gradient(135deg, var(--gold), #a97f1a);
    color:var(--ink); margin-bottom:16px;
  }
  .champion-banner .display{font-size:36px; margin:6px 0;}

  .results-dashboard{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px;}
  .result-box{
    flex:1; min-width:160px; text-align:center; padding:14px 10px;
    background:var(--court-panel); border:1px solid rgba(247,244,236,0.12); border-radius:12px;
  }
  .result-box .rlabel{font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted);}
  .result-box .rvalue{font-family:'Anton',sans-serif; font-size:16px; margin-top:6px; letter-spacing:0.3px;}
  .result-box.winner-box{border-color:var(--gold);}
  .result-box.winner-box .rvalue{color:var(--gold);}
  .result-box.runner-box{border-color:var(--muted);}
  .result-box.runner-box .rvalue{color:var(--muted);}
  .result-box.semi-box{border-color:#b98a5e;}
  .result-box.semi-box .rvalue{color:#c99a70; font-size:14px;}

  .error-banner{
    background:rgba(201,74,44,0.18); border:1px solid var(--danger); color:var(--cream);
    border-radius:12px; padding:12px 14px; margin-bottom:14px; font-size:13px;
  }
  .share-bar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    background:rgba(247,244,236,0.05); border:1px solid rgba(247,244,236,0.15);
    border-radius:12px; padding:10px 14px; margin-bottom:16px; font-size:12px;
  }
  .share-bar .link-txt{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:120px;
  }
  .status-tag{
    display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px;
    font-family:'JetBrains Mono',monospace; font-weight:700;
    background:rgba(247,244,236,0.1); color:var(--muted);
  }
  .status-tag.qualifying{ background:var(--gold); color:var(--ink); }
  .group-tag{
    display:inline-block; padding:2px 8px; border-radius:6px; font-size:10px;
    text-transform:uppercase; letter-spacing:0.5px; font-weight:700;
    background:rgba(247,244,236,0.08); color:var(--muted); margin-left:8px;
  }
  .paid-check{
    display:inline-flex; align-items:center; gap:6px; font-size:12px;
    color:var(--muted); cursor:default; white-space:nowrap;
  }
  .paid-check input{ width:15px; height:15px; cursor:pointer; accent-color:var(--gold); }
  .paid-check input:disabled{ cursor:default; }
  .footnote{font-size:12px; color:var(--muted); margin-top:24px; line-height:1.5;}
  .row-actions{display:flex; gap:6px;}
  .lock-panel{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .warn{color:var(--smash); font-size:12px; margin-top:6px;}
</style>
</head>
<body>
<div id="app">Loading tournament…</div>

<script>
(function(){
  // Shared storage backend: JSONBlob (https://jsonblob.com) — free, public, no login required
  // for admins or players. The blob's id lives in the page URL hash (#blob=<id>) so that
  // whoever opens the exact same link reads and writes the exact same tournament data.
  const BLOB_API = 'https://jsonblob.com/api/jsonBlob';
  let blobId = null;
  let state = null;
  let isAdmin = false;
  let activeTab = 'teams';
  let tossAnim = {}; // matchId -> {flipping, result}
  let storageError = null;

  function defaultState(){
    return {
      teams: [],
      groups: [],
      matches: [],
      qualifyPerGroup: 1,
      adminPin: null,
      champion: null,
      tournamentDate: null,
      monthlyResults: []
    };
  }

  function uid(){ return Math.random().toString(36).slice(2,10); }

  function getBlobIdFromHash(){
    const m = window.location.hash.match(/blob=([a-zA-Z0-9-]+)/);
    return m ? m[1] : null;
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  async function fetchWithRetry(url, options, retries){
    retries = retries == null ? 3 : retries;
    let lastRes = null;
    for(let attempt = 0; attempt <= retries; attempt++){
      lastRes = await fetch(url, options);
      if(lastRes.status !== 429) return lastRes;
      if(attempt < retries) await sleep(1000 * (attempt + 1)); // back off a bit longer each retry
    }
    return lastRes; // still 429 after retries — let the caller handle it
  }

  async function ensureBlobId(){
    const existing = getBlobIdFromHash();
    if(existing){ blobId = existing; return; }
    // First-ever visit for this link: create a fresh shared blob and put its id in the URL.
    const res = await fetchWithRetry(BLOB_API, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify(defaultState())
    });
    if(res.status === 429) throw new Error('The shared storage service is busy right now (too many requests). Wait a minute and reload.');
    if(!res.ok) throw new Error('Could not create shared storage (status ' + res.status + ').');
    const location = res.headers.get('Location') || res.headers.get('location');
    if(!location) throw new Error('Shared storage created, but no id was returned.');
    blobId = location.split('/').pop();
    window.location.hash = 'blob=' + blobId;
  }

  async function loadState(){
    storageError = null;
    try{
      await ensureBlobId();
      const res = await fetchWithRetry(BLOB_API + '/' + blobId + '?_=' + Date.now(), { headers: {'Accept':'application/json', 'Cache-Control':'no-cache'}, cache: 'no-store' });
      if(res.status === 429) throw new Error('The shared storage service is busy right now (too many requests). Wait a minute and reload — your data is safe.');
      if(!res.ok) throw new Error('Could not load tournament data (status ' + res.status + ').');
      state = Object.assign(defaultState(), await res.json());
    }catch(e){
      console.error('Storage error', e);
      storageError = e.message && e.message.indexOf('busy right now') !== -1
        ? e.message
        : 'Could not connect to shared tournament storage. Check your internet connection, then reload this page. (' + e.message + ')';
      state = defaultState();
    }
  }
  async function saveState(){
    try{
      if(!blobId) await ensureBlobId();
      const res = await fetchWithRetry(BLOB_API + '/' + blobId, {
        method: 'PUT',
        headers: {'Content-Type':'application/json', 'Accept':'application/json'},
        body: JSON.stringify(state)
      });
      if(res.status === 429){ storageError = 'The shared storage service is busy right now — this change may not have saved. Wait a minute, then try again.'; }
      else if(!res.ok){ console.error('Save failed with status', res.status); storageError = 'Your last change may not have saved. Check your connection and try again.'; }
      else { storageError = null; }
    }catch(e){ console.error('Storage error', e); storageError = 'Your last change may not have saved. Check your connection and try again.'; }
  }

  function shareableLink(){ return window.location.href; }

  // ---------- Domain logic ----------
  function groupOptions(n){
    const opts = [];
    if(n < 4) return opts;
    const maxG = Math.floor(n/2);
    for(let g=2; g<=maxG; g++){
      const base = Math.floor(n/g), rem = n % g;
      const desc = rem === 0
        ? (g + ' groups of ' + base)
        : (rem + ' group(s) of ' + (base+1) + ', ' + (g-rem) + ' of ' + base);
      opts.push({g, desc});
    }
    return opts;
  }

  function roundRobinPairs(teamIds){
    let ids = teamIds.slice();
    if(ids.length % 2 !== 0) ids.push(null);
    const n = ids.length, rounds = n-1, half = n/2;
    let arr = ids.slice();
    const pairs = [];
    for(let r=0; r<rounds; r++){
      for(let i=0; i<half; i++){
        const a = arr[i], b = arr[n-1-i];
        if(a !== null && b !== null) pairs.push([a,b]);
      }
      arr.splice(1,0, arr.pop());
    }
    return pairs;
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function createGroups(numGroups){
    const shuffled = shuffle(state.teams.map(t=>t.id));
    const groups = [];
    for(let i=0;i<numGroups;i++){
      groups.push({ id: uid(), name: 'Group ' + String.fromCharCode(65+i), teamIds: [] });
    }
    shuffled.forEach((tid, idx) => { groups[idx % numGroups].teamIds.push(tid); });
    state.groups = groups;
    state.matches = [];
    groups.forEach(g => {
      const pairs = roundRobinPairs(g.teamIds);
      pairs.forEach(([a,b]) => {
        state.matches.push({
          id: uid(), stage: 'league', groupId: g.id, slotIndex: null,
          teamA: a, teamB: b, scoreA: null, scoreB: null, winner: null, toss: null
        });
      });
    });
    state.champion = null;
  }

  function teamName(id){
    if(!id) return null;
    const t = state.teams.find(t=>t.id===id);
    return t ? t.name : 'Unknown';
  }

  function computeStandings(groupId){
    const grp = state.groups.find(g=>g.id===groupId);
    if(!grp) return [];
    const table = {};
    grp.teamIds.forEach(tid => { table[tid] = {teamId:tid, played:0, wins:0, losses:0, pf:0, pa:0}; });
    state.matches.filter(m=>m.stage==='league' && m.groupId===groupId).forEach(m=>{
      if(m.winner){
        table[m.teamA].played++; table[m.teamB].played++;
        table[m.teamA].pf += (m.scoreA||0); table[m.teamA].pa += (m.scoreB||0);
        table[m.teamB].pf += (m.scoreB||0); table[m.teamB].pa += (m.scoreA||0);
        if(m.winner === m.teamA){ table[m.teamA].wins++; table[m.teamB].losses++; }
        else { table[m.teamB].wins++; table[m.teamA].losses++; }
      }
    });
    return Object.values(table).sort((a,b)=>{
      if(b.wins !== a.wins) return b.wins - a.wins;
      const pdA = a.pf - a.pa, pdB = b.pf - b.pa;
      if(pdB !== pdA) return pdB - pdA;
      return b.pf - a.pf;
    });
  }

  function findTeamGroupAndStanding(teamId){
    for(const g of state.groups){
      if(g.teamIds.includes(teamId)){
        const standings = computeStandings(g.id);
        const rank = standings.findIndex(r=>r.teamId===teamId);
        return { group: g, standings, rank, row: standings[rank] };
      }
    }
    return null;
  }

  function combinedStandings(){
    // One flat, ranked list across every group — each row keeps its own group
    // qualifying rank (for the Status tag) but the overall order spans all teams.
    const rows = [];
    state.groups.forEach(g => {
      const standings = computeStandings(g.id);
      standings.forEach((row, groupRank) => {
        rows.push(Object.assign({}, row, { group: g, groupRank }));
      });
    });
    rows.sort((a,b) => {
      if(b.wins !== a.wins) return b.wins - a.wins;
      const pdA = a.pf - a.pa, pdB = b.pf - b.pa;
      if(pdB !== pdA) return pdB - pdA;
      return b.pf - a.pf;
    });
    return rows;
  }

  function findFinalMatch(){
    return state.matches.find(m => m.stage === 'final') || null;
  }

  function findSemifinalMatches(){
    return state.matches.filter(m => m.stage === 'sf');
  }

  function statusTag(rank, qualifyPerGroup){
    const qualifying = rank < qualifyPerGroup;
    if(!qualifying) return '';
    return '<span class="status-tag qualifying">Q</span>';
  }

  function groupComplete(groupId){
    const ms = state.matches.filter(m=>m.stage==='league' && m.groupId===groupId);
    return ms.length > 0 && ms.every(m=>m.winner);
  }
  function allGroupsComplete(){
    return state.groups.length > 0 && state.groups.every(g=>groupComplete(g.id));
  }

  function knockoutStagesForQ(q){
    if(q===8) return ['qf','sf','final'];
    if(q===4) return ['sf','final'];
    if(q===2) return ['final'];
    return null;
  }

  function computeQualifierCount(){
    return state.groups.length * state.qualifyPerGroup;
  }

  function generateKnockouts(){
    const q = computeQualifierCount();
    const stages = knockoutStagesForQ(q);
    if(!stages) return false;
    const qualifiers = [];
    for(let rank=0; rank<state.qualifyPerGroup; rank++){
      state.groups.forEach(g => {
        const standings = computeStandings(g.id);
        if(standings[rank]) qualifiers.push(standings[rank].teamId);
      });
    }
    const firstRoundPairs = [];
    for(let i=0;i<q/2;i++){ firstRoundPairs.push([qualifiers[i], qualifiers[q-1-i]]); }

    state.matches = state.matches.filter(m=>m.stage==='league');
    firstRoundPairs.forEach(([a,b], idx) => {
      state.matches.push({ id: uid(), stage: stages[0], groupId:null, slotIndex: idx, teamA:a, teamB:b, scoreA:null, scoreB:null, winner:null, toss:null });
    });
    for(let r=1;r<stages.length;r++){
      const count = q / Math.pow(2, r+1);
      for(let i=0;i<count;i++){
        state.matches.push({ id: uid(), stage: stages[r], groupId:null, slotIndex: i, teamA:null, teamB:null, scoreA:null, scoreB:null, winner:null, toss:null });
      }
    }
    state.champion = null;
  }

  function currentKnockoutStages(){
    const q = computeQualifierCount();
    return knockoutStagesForQ(q) || [];
  }

  function propagateWinner(match){
    const stages = currentKnockoutStages();
    const idx = stages.indexOf(match.stage);
    if(idx === -1 || idx === stages.length - 1){
      if(match.stage === 'final' || (idx === stages.length-1 && stages.length>0)){
        state.champion = match.winner;
      }
      return;
    }
    const nextStage = stages[idx+1];
    const nextSlot = Math.floor(match.slotIndex/2);
    const nextMatch = state.matches.find(m=>m.stage===nextStage && m.slotIndex===nextSlot);
    if(nextMatch){
      if(match.slotIndex % 2 === 0){ nextMatch.teamA = match.winner; } else { nextMatch.teamB = match.winner; }
    }
  }

  function decideWinner(scoreA, scoreB){
    if(scoreA == null || scoreB == null) return null;
    if(scoreA >= 21 && scoreA > scoreB) return 'A';
    if(scoreB >= 21 && scoreB > scoreA) return 'B';
    return null;
  }

  // ---------- Rendering ----------
  function el(html){
    html = html.trim();
    // Browsers silently drop <tr>/<td>/<th> tags when parsed outside a real
    // <table> context, so those need a table/tbody/tr wrapper to parse correctly.
    if(/^<tr[\s>]/i.test(html)){
      const table = document.createElement('table');
      const tbody = document.createElement('tbody');
      table.appendChild(tbody);
      tbody.innerHTML = html;
      return tbody.firstElementChild;
    }
    if(/^<t[dh][\s>]/i.test(html)){
      const table = document.createElement('table');
      const tbody = document.createElement('tbody');
      const tr = document.createElement('tr');
      table.appendChild(tbody);
      tbody.appendChild(tr);
      tr.innerHTML = html;
      return tr.firstElementChild;
    }
    const d = document.createElement('div');
    d.innerHTML = html;
    return d.firstElementChild;
  }

  function renderMatchCard(m){
    const wrap = el('<div class="match"></div>');
    const nameA = teamName(m.teamA) || 'TBD';
    const nameB = teamName(m.teamB) || 'TBD';
    const top = el('<div class="match-top"></div>');
    const versus = el('<div class="versus"></div>');
    const chipA = el('<div class="team-chip' + (!m.teamA?' tbd':'') + (m.winner===m.teamA?' win':'') + '">' + escapeHtml(nameA) + '</div>');
    const vsTxt = el('<div class="vs-txt">vs</div>');
    const chipB = el('<div class="team-chip' + (!m.teamB?' tbd':'') + (m.winner===m.teamB?' win':'') + '">' + escapeHtml(nameB) + '</div>');
    versus.appendChild(chipA); versus.appendChild(vsTxt); versus.appendChild(chipB);
    top.appendChild(versus);

    if(m.scoreA != null && m.scoreB != null){
      top.appendChild(el('<div class="score-mono">' + m.scoreA + ' — ' + m.scoreB + '</div>'));
    }
    wrap.appendChild(top);

    if(m.winner){
      wrap.appendChild(el('<div class="winner-tag">🏆 ' + escapeHtml(teamName(m.winner)) + ' wins</div>'));
    }
    if(m.toss){
      wrap.appendChild(el('<div class="toss-note">Toss: ' + escapeHtml(teamName(m.toss.winnerTeam)) + ' won the toss (' + m.toss.result + ') and chose ' + m.toss.choice + '.</div>'));

    if(isAdmin && m.teamA && m.teamB){
      const actions = el('<div class="match-actions"></div>');

  function openScoreEditor(m, wrap){
    if(wrap.querySelector('.score-edit')) return;
    const editor = el(
      '<div class="score-edit">' +
        '<div><label>' + escapeHtml(teamName(m.teamA)) + '</label><input type="number" min="0" id="sa" value="' + (m.scoreA ?? '') + '"></div>' +
        '<div><label>' + escapeHtml(teamName(m.teamB)) + '</label><input type="number" min="0" id="sb" value="' + (m.scoreB ?? '') + '"></div>' +
        '<button class="primary" id="save-score">Save</button>' +
      '</div>'
    );
    wrap.appendChild(editor);
    editor.querySelector('#save-score').onclick = async () => {
      const sa = editor.querySelector('#sa').value;
      const sb = editor.querySelector('#sb').value;
      if(sa === '' || sb === ''){ alert('Enter both scores.'); return; }
      m.scoreA = Number(sa); m.scoreB = Number(sb);
      const res = decideWinner(m.scoreA, m.scoreB);
      m.winner = res === 'A' ? m.teamA : (res === 'B' ? m.teamB : null);
      if(m.winner && m.stage !== 'league'){ propagateWinner(m); }
      if(!m.winner){ alert('Saved. No winner yet — one team needs 21+ points and a lead to be marked the winner.'); }
      await saveState(); render();
    };
  }

  function openToss(m, wrap){
    if(wrap.querySelector('.coin-wrap')) return;
    const box = el(
      '<div class="coin-wrap">' +
        '<div class="coin-scene"><div class="coin"><div class="coin-face heads"><div class="big">₹1</div><div class="small">HEADS</div></div><div class="coin-face tails"><div class="big">₹1</div><div class="small">TAILS</div></div></div></div>' +
        '<button class="small gold" id="flip-btn">Flip the coin</button>' +
        '<div class="toss-result" id="toss-result"></div>' +
      '</div>'
    );
    wrap.appendChild(box);
    const coin = box.querySelector('.coin');
    box.querySelector('#flip-btn').onclick = () => {
      const isTails = Math.random() < 0.5;
      coin.classList.remove('flip','tails');
      void coin.offsetWidth;
      coin.classList.add('flip'); if(isTails) coin.classList.add('tails');
      setTimeout(() => {
        const result = isTails ? 'Tails' : 'Heads';
        box.querySelector('#toss-result').textContent = result + '!';
        const winnerTeam = confirm(result + '! Click OK if ' + teamName(m.teamA) + ' won the toss, or Cancel if ' + teamName(m.teamB) + ' won it.') ? m.teamA : m.teamB;
        const choice = confirm('Did the toss winner choose to SERVE? (OK = Serve, Cancel = Choose side)') ? 'to serve' : 'a side';
        m.toss = { result, winnerTeam, choice };
        saveState(); render();
      }, 2250);
    };
  }

      tbody.appendChild(tr);
    });
    card.appendChild(table);
    wrap.appendChild(card);
    return wrap;
  }

  function monthLabelFromDate(dateStr){
    if(!dateStr) return null;
    const d = new Date(dateStr + 'T00:00:00');
    if(isNaN(d.getTime())) return null;
    return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
  }

  function renderOverviewTab(){
    const wrap = document.createElement('div');
    const currentLabel = monthLabelFromDate(state.tournamentDate);

    if(isAdmin){
      const dateCard = el(
        '<div class="card">' +
          '<h2>Tournament date</h2>' +
          '<div class="grid-2">' +
            '<div><label>Date this tournament is being held</label><input type="date" id="tourney-date" value="' + (state.tournamentDate || '') + '"></div>' +
          '</div>' +
          '<div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">' +
            '<button class="primary small" id="save-date-btn">Save date</button>' +
            '<button class="small gold" id="archive-btn">Archive current Top 5 under this month</button>' +
          '</div>' +
        '</div>'
      );
      wrap.appendChild(dateCard);
      dateCard.querySelector('#save-date-btn').onclick = async () => {
        const val = dateCard.querySelector('#tourney-date').value;
        state.tournamentDate = val || null;
        await saveState(); render();
      };
      dateCard.querySelector('#archive-btn').onclick = async () => {
        if(!state.tournamentDate){ alert('Set and save a tournament date first.'); return; }
        if(state.groups.length === 0){ alert('No standings yet to archive.'); return; }
        const label = monthLabelFromDate(state.tournamentDate);
        const top5 = combinedStandings().slice(0, 5).map(row => ({
          name: teamName(row.teamId), wins: row.wins, losses: row.losses, diff: row.pf - row.pa
        }));
        if(!confirm('Archive the current Top 5 under "' + label + '"? You can keep editing scores afterward — this just saves a snapshot.')) return;
        state.monthlyResults.push({ id: uid(), label, date: state.tournamentDate, top5 });
        await saveState(); render();
      };
    }

    if(state.groups.length === 0 && state.monthlyResults.length === 0){
      wrap.appendChild(el('<div class="card"><div class="empty">Standings will appear here once groups and matches are set up.</div></div>'));
      return wrap;
    }

    if(state.groups.length > 0){
      const top5 = combinedStandings().slice(0, 5);
      const card = el('<div class="card"><h2>' + escapeHtml(currentLabel || 'Current') + ' — Top 5 Teams (live)</h2></div>');
      const table = el(
        '<table><thead><tr><th>#</th><th>Team</th><th>Group</th><th>W</th><th>L</th><th>+/-</th></tr></thead><tbody></tbody></table>'
      );
      const tbody = table.querySelector('tbody');
      top5.forEach((row, i) => {
        const tr = el(
          '<tr' + (i===0 ? ' class="leader"' : '') + '>' +
            '<td>' + (i+1) + '</td>' +
            '<td>' + escapeHtml(teamName(row.teamId)) + '</td>' +
            '<td>' + escapeHtml(row.group.name) + '</td>' +
            '<td>' + row.wins + '</td><td>' + row.losses + '</td><td>' + (row.pf-row.pa) + '</td>' +
          '</tr>'
        );
        tbody.appendChild(tr);
      });
      card.appendChild(table);
      wrap.appendChild(card);
    }

    if(state.monthlyResults.length){
      const slicedNewestFirst = state.monthlyResults.slice().reverse();
      slicedNewestFirst.forEach(entry => {
        const card = el('<div class="card"><h2>' + escapeHtml(entry.label) + ' — Top 5 (archived)</h2></div>');
        const table = el(
          '<table><thead><tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>+/-</th></tr></thead><tbody></tbody></table>'
        );
        const tbody = table.querySelector('tbody');
        entry.top5.forEach((row, i) => {
          tbody.appendChild(el(
            '<tr' + (i===0 ? ' class="leader"' : '') + '>' +
              '<td>' + (i+1) + '</td><td>' + escapeHtml(row.name) + '</td>' +
              '<td>' + row.wins + '</td><td>' + row.losses + '</td><td>' + row.diff + '</td>' +
            '</tr>'
          ));
        });
        card.appendChild(table);
        if(isAdmin){
          const delBtn = el('<button class="small ghost" style="margin-top:10px;">Remove this archived month</button>');
          delBtn.onclick = async () => {
            if(!confirm('Remove the archived "' + entry.label + '" results? This cannot be undone.')) return;
            state.monthlyResults = state.monthlyResults.filter(x => x.id !== entry.id);
            await saveState(); render();
          };
          card.appendChild(delBtn);
        }
        wrap.appendChild(card);
      });
    }
    return wrap;
  }

  function renderResultsDashboard(){
    if(state.groups.length === 0) return document.createDocumentFragment();
    const final = findFinalMatch();
    const sfMatches = findSemifinalMatches();

    const winnerId = (final && final.winner) ? final.winner : null;
    const runnerId = (final && final.winner && final.teamA && final.teamB)
      ? (final.winner === final.teamA ? final.teamB : final.teamA) : null;
    const semiLosers = sfMatches.filter(m => m.winner).map(m => m.winner === m.teamA ? m.teamB : m.teamA);

    const wrap = el('<div class="results-dashboard"></div>');
    wrap.appendChild(el(
      '<div class="result-box winner-box">' +
        '<div class="rlabel">🏆 Winner</div>' +
        '<div class="rvalue">' + (winnerId ? escapeHtml(teamName(winnerId)) : 'TBD') + '</div>' +
      '</div>'
    ));
    wrap.appendChild(el(
      '<div class="result-box runner-box">' +
        '<div class="rlabel">🥈 Runner-up</div>' +
        '<div class="rvalue">' + (runnerId ? escapeHtml(teamName(runnerId)) : 'TBD') + '</div>' +
      '</div>'
    ));
    wrap.appendChild(el(
      '<div class="result-box semi-box">' +
        '<div class="rlabel">🥉 Semifinalist' + (semiLosers.length > 1 ? 's' : '') + '</div>' +
        '<div class="rvalue">' + (semiLosers.length ? semiLosers.map(id => escapeHtml(teamName(id))).join(' · ') : (sfMatches.length ? 'TBD' : '—')) + '</div>' +
      '</div>'
    ));
    return wrap;
  }

  function renderErrorBanner(){
    return el('<div class="error-banner">⚠️ ' + escapeHtml(storageError) + '</div>');
  }

  function renderShareBar(){
    const bar = el(
      '<div class="share-bar">' +
        '<span>🔗 Share this exact link so everyone sees the same tournament:</span>' +
        '<span class="link-txt">' + escapeHtml(shareableLink()) + '</span>' +
      '</div>'
    );
    const refreshBtn = el('<button class="small">↻ Refresh scores</button>');
    refreshBtn.onclick = async () => {
      refreshBtn.textContent = 'Refreshing…';
      await loadState();
      render();
    };
    bar.appendChild(refreshBtn);
    const copyBtn = el('<button class="small gold">Copy link</button>');
    copyBtn.onclick = async () => {
      try{
        await navigator.clipboard.writeText(shareableLink());
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy link'; }, 1500);
      }catch(e){
        alert('Could not copy automatically. Copy this link manually:\n' + shareableLink());
      }
    };
    bar.appendChild(copyBtn);
    return bar;
  }

  function renderFootnote(){
    return el(
      '<div class="footnote">Share the exact link above (including the code after #) with players so they can follow the draw, fixtures and results live — no account or sign-in needed. Only the admin (PIN-protected) can add teams, run the toss and enter scores; that PIN is a light gate for convenience, not strong security. Data is stored via a free public JSON storage service — anyone with this exact link can read it, so avoid putting sensitive personal details in team names or member lists.</div>'
    );
  }

  function escapeHtml(s){
    if(s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function init(){
    await loadState();
    render();
  }
  init();
})();
</script>
</body>
</html>
